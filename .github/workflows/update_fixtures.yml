name: Update J1 Fixtures

on:
  schedule:
    - cron: '0 15 * * 1'  # 毎週月曜 00:00 JST (= 日曜 15:00 UTC)
  workflow_dispatch:       # 手動実行も可能

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install Python dependencies
        run: pip install requests beautifulsoup4 lxml pandas

      - name: Fetch fixtures and standings
        env:
          API_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python scripts/fetch_fixtures.py

      - name: Fetch lottery draw results
        run: python scripts/fetch_lottery.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fixtures.json historical.json lottery.json
          git diff --staged --quiet || git commit -m "Update J1 fixtures and lottery data $(date +'%Y-%m-%d')"
          git push
